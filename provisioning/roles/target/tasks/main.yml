---
# This is a role for setting up the target.

- name: Add host aliases
  lineinfile:
      path: '/etc/hosts'
      line: "{{ item.ip }} {{ item.name }}"
      state: present
  loop: "{{ hosts_entries }}"

- name: Add user and set password
  user:
    name: '{{ username }}'
    password: '{{ password | password_hash(''sha512'') }}'
    shell: '/bin/bash'

- name: Copy files
  copy:
      src: "{{ item }}"
      dest: "/home/{{ username }}/{{ item }}"
      owner: "{{ username }}"
      mode: "0644"
  loop: "{{ files_to_copy }}"

- name: Create files
  copy:
      dest: "/home/{{ username }}/{{ item.name }}"
      content: "{{ item.content }}"
      owner: "{{ username }}"
      mode: "0644"
  loop: "{{ files_to_create }}"
  

- name: Install packages
  apt:
      name: "{{ packages_to_install }}"
      state: present
      update_cache: yes

- name: Change Telnet port
  replace:
    path: /etc/services
    regexp: '23/tcp'
    replace: '{{ telnet_port }}/tcp'

# xinetd must be installed after changing the Telnet port
- name: Install xinetd package
  apt:
    name: xinetd

- name: Copy xinetd telnet file
  copy:
    src: telnet
    dest: /etc/xinetd.d/telnet
    owner: root
    mode: '0644'
  notify: restart xinetd

- name: Create privilege escalation vulnerability
  lineinfile:
    path: /etc/sudoers
    line: '{{ username }} ALL=(ALL) /usr/bin/less /home/{{ username }}/flag.txt'

- name: Place flag
  copy:
    dest: '/home/{{ username }}/flag.txt'
    owner: '{{ username }}'
    content: "{{ flag }}\n"
    mode: '0600'

- name: Place second flag
  copy:
    dest: '/root/flag.txt'
    owner: root
    content: "{{ flag_2 }}\n"
    mode: '0600'


...
